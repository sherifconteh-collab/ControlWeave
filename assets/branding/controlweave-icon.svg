<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#525f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a4a6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0074d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005aaa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)" />

  <!-- Weave grid: horizontal bars -->
  <rect x="96"  y="156" width="320" height="44" rx="22" fill="white" opacity="0.15"/>
  <rect x="96"  y="234" width="320" height="44" rx="22" fill="white" opacity="0.15"/>
  <rect x="96"  y="312" width="320" height="44" rx="22" fill="white" opacity="0.15"/>

  <!-- Weave grid: vertical bars (cross-woven) -->
  <rect x="156" y="96"  width="44" height="320" rx="22" fill="white" opacity="0.15"/>
  <rect x="234" y="96"  width="44" height="320" rx="22" fill="white" opacity="0.15"/>
  <rect x="312" y="96"  width="44" height="320" rx="22" fill="white" opacity="0.15"/>

  <!-- Accent intersections (weave nodes) -->
  <rect x="156" y="156" width="44" height="44" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="312" y="156" width="44" height="44" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="234" y="234" width="44" height="44" rx="8" fill="url(#accentGrad)" opacity="1"/>
  <rect x="156" y="312" width="44" height="44" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="312" y="312" width="44" height="44" rx="8" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Center lock icon -->
  <rect x="218" y="248" width="76" height="60" rx="10" fill="white" opacity="0.95"/>
  <path d="M238 248 v-18 a18 18 0 0 1 36 0 v18" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  <circle cx="256" cy="272" r="6" fill="#0074d4"/>
</svg>
