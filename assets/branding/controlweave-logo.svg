<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#525f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a4a6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0074d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005aaa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="32" ry="32" fill="url(#bgGrad)" />

  <!-- ── Icon mark (left side) ── -->
  <!-- Weave horizontal bars -->
  <rect x="60"  y="128" width="220" height="30" rx="15" fill="white" opacity="0.15"/>
  <rect x="60"  y="185" width="220" height="30" rx="15" fill="white" opacity="0.15"/>
  <rect x="60"  y="242" width="220" height="30" rx="15" fill="white" opacity="0.15"/>

  <!-- Weave vertical bars -->
  <rect x="108" y="80"  width="30" height="240" rx="15" fill="white" opacity="0.15"/>
  <rect x="165" y="80"  width="30" height="240" rx="15" fill="white" opacity="0.15"/>
  <rect x="222" y="80"  width="30" height="240" rx="15" fill="white" opacity="0.15"/>

  <!-- Accent intersections -->
  <rect x="108" y="128" width="30" height="30" rx="6" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="222" y="128" width="30" height="30" rx="6" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="165" y="185" width="30" height="30" rx="6" fill="url(#accentGrad)" opacity="1"/>
  <rect x="108" y="242" width="30" height="30" rx="6" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="222" y="242" width="30" height="30" rx="6" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Center lock -->
  <rect x="148" y="196" width="64" height="52" rx="9" fill="white" opacity="0.95"/>
  <path d="M163 196 v-16 a17 17 0 0 1 34 0 v16" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
  <circle cx="180" cy="218" r="6" fill="#0074d4"/>

  <!-- Divider line -->
  <line x1="320" y1="80" x2="320" y2="320" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- ── Wordmark ── -->
  <!-- "Control" in white -->
  <text
    x="360" y="248"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="118"
    font-weight="700"
    letter-spacing="-3"
    fill="white"
  >Control</text>

  <!-- "Weave" in accent blue -->
  <text
    x="360" y="340"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="118"
    font-weight="300"
    letter-spacing="-3"
    fill="#0074d4"
  >Weave</text>

  <!-- Tagline -->
  <text
    x="362" y="370"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    letter-spacing="3"
    fill="white"
    opacity="0.55"
  >GRC PLATFORM</text>
</svg>
