# Nixpacks configuration for Railway deployment
# This ensures proper Node.js version and build optimization

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["target_dir=.; if [ -f controlweave/backend/package.json ]; then target_dir=controlweave/backend; fi; cd \"$target_dir\" && (npm ci --production=false || npm install --production=false)"]

[phases.build]
# No build step needed for this Express app

[start]
cmd = "target_dir=.; if [ -f controlweave/backend/package.json ]; then target_dir=controlweave/backend; fi; cd \"$target_dir\" && npm start"

[variables]
# Ensure Node.js is in production mode on Railway
NODE_ENV = "production"
